<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Panopticon — OS for AI-agent work</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <header id="topbar">
      <div class="brand">
        <span class="eye">◉</span> Panopticon
        <span class="sub">process manager · <span id="brainName">…</span></span>
      </div>
      <div class="knobs">
        <label>bubbles/min <input id="bpm" type="range" min="0" max="20" step="1" /><b id="bpmV"></b></label>
        <label>suggestion TTL <input id="ttl" type="range" min="0" max="600" step="15" /><b id="ttlV"></b>s</label>
        <span id="conn" class="conn off">● offline</span>
      </div>
    </header>

    <main id="stage">
      <section id="board" aria-label="processes"></section>
      <aside id="bubbles" aria-label="suggestions">
        <h2>Idea bubbles <span class="hint">always-on · ambient</span></h2>
        <div id="bubbleList"></div>
      </aside>
    </main>

    <section id="selectedPanel" class="hidden">
      <div class="selHead">
        <span id="selTitle"></span>
        <button id="selClose" title="deselect">✕</button>
      </div>
      <div id="selLog"></div>
      <form id="promptForm">
        <input id="promptInput" autocomplete="off" placeholder="Steer the selected process — type, then Enter…" />
        <button type="submit">Send ⏎</button>
      </form>
    </section>

    <footer id="roombar">
      <span class="mic">🎙 room</span>
      <form id="transcriptForm">
        <input id="transcriptInput" autocomplete="off"
          placeholder="What's being said in the room… (ambient → idea bubbles). Try: “we should build a tool to track…”" />
        <button type="button" id="micBtn" title="voice (Web Speech API)">🎤</button>
        <button type="submit">Say</button>
      </form>
    </footer>

    <script type="module" src="/app.js"></script>
  </body>
</html>
