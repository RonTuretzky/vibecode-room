<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Gesture Wall — Camera Aim (step by step)</title>
<style>
  :root{ --bg:#15151b; --panel:#1d1d25; --panel2:#23232d; --line:#33333f; --ink:#ececf2;
    --dim:#9a9aa8; --accent:#3cc8dc; --accent2:#46c66e; --warn:#e7b24c; --bad:#e2685f;
    --cam0:#c878dc; --cam1:#e7b24c; color-scheme:dark; }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--ink);font-family:system-ui,-apple-system,sans-serif}
  #top{position:fixed;top:0;left:0;right:0;height:54px;display:flex;align-items:center;gap:14px;
    padding:0 20px;background:rgba(20,20,26,.96);border-bottom:1px solid var(--line);z-index:10}
  #top .name{font-weight:800;font-size:15px;white-space:nowrap}
  #bar{flex:1;height:8px;background:#2a2a34;border-radius:99px;overflow:hidden}
  #fill{height:100%;width:0;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .25s}
  #count{font-size:13px;color:var(--dim);white-space:nowrap;font-variant-numeric:tabular-nums}
  main{max-width:1000px;margin:0 auto;padding:74px 22px 96px}
  .kicker{color:var(--accent);font-weight:700;letter-spacing:.13em;text-transform:uppercase;font-size:12px;margin:0 0 6px}
  h2{font-size:clamp(22px,3vw,30px);margin:0 0 12px}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:24px;align-items:start}
  @media(max-width:820px){.grid{grid-template-columns:1fr}}
  p,li{font-size:16px;line-height:1.6;color:#dcdce4} b{color:#fff}
  figure{margin:0;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:12px;text-align:center}
  figcaption{color:var(--dim);font-size:13px;margin-top:6px}
  svg{max-width:100%;height:auto}
  label.ctl{display:block;margin:14px 0;font-size:14px;color:#dcdce4}
  label.ctl .row{display:flex;justify-content:space-between;align-items:baseline}
  label.ctl .v{color:var(--accent);font-weight:700;font-variant-numeric:tabular-nums}
  input[type=range]{width:100%;margin-top:6px;accent-color:var(--accent)}
  .hint{color:var(--dim);font-size:12.5px;margin-top:3px}
  .out{background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:12px 14px;margin:12px 0;font-size:15px;line-height:1.6}
  .out .num{color:var(--accent);font-weight:800;font-variant-numeric:tabular-nums}
  .tip,.note,.ok,.warn,.bad{border-left:3px solid var(--accent);background:rgba(60,200,220,.08);padding:10px 13px;border-radius:0 9px 9px 0;margin:12px 0;font-size:14.5px;line-height:1.55}
  .note{border-color:#5a5a66;background:#23232d} .ok{border-color:var(--accent2);background:rgba(70,198,110,.10)}
  .warn{border-color:var(--warn);background:rgba(231,178,76,.10)} .bad{border-color:var(--bad);background:rgba(226,104,95,.12)}
  .callhead{font-weight:800;color:#fff}
  .cams{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin:10px 0}
  @media(max-width:560px){.cams{grid-template-columns:1fr}}
  .camcard{border:1px solid var(--line);border-radius:10px;padding:12px 14px;background:var(--panel)}
  .camcard.c0{border-left:5px solid var(--cam0)} .camcard.c1{border-left:5px solid var(--cam1)}
  .camcard h3{margin:0 0 8px;font-size:14px}
  .kv{display:flex;justify-content:space-between;padding:4px 0;font-size:13.5px;border-bottom:1px solid #2a2a32}
  .kv:last-child{border:none} .kv .k{color:var(--dim)} .kv .val{font-weight:700;font-variant-numeric:tabular-nums}
  code{font-family:ui-monospace,Menlo,monospace;background:#000;color:#9fe;padding:.05em .4em;border-radius:5px;font-size:.88em;border:1px solid #2a2a34}
  #nav{position:fixed;left:0;right:0;bottom:0;height:64px;display:flex;justify-content:space-between;align-items:center;
    padding:0 22px;background:rgba(20,20,26,.96);border-top:1px solid var(--line);z-index:10}
  .btn{background:#2563aa;border:1px solid #2f74c4;color:#fff;border-radius:9px;padding:11px 20px;font-size:15px;cursor:pointer;font-weight:600}
  .btn:hover{background:#2f74c4} .btn.ghost{background:#23232d;border-color:#44444e;color:#cfcfd6}
  .btn:disabled{opacity:.35;cursor:default}
</style>
</head>
<body>
<div id="top">
  <span class="name">🎥 Camera Aim · step by step</span>
  <div id="bar"><div id="fill"></div></div>
  <span id="count">Step 1 / 6</span>
</div>

<main id="stage"></main>

<div id="nav">
  <button class="btn ghost" id="prev">← Back</button>
  <span id="dots" style="color:var(--dim);font-size:13px"></span>
  <button class="btn" id="next">Next →</button>
</div>

<script>
// ---------- shared state (carries across steps) ----------
const S = { ang:90, dUser:2.5, h:2.1, aim:1.4, dCam:0.6, w:0.9 };
const D = r => r*180/Math.PI, f2 = x => x.toFixed(2), f1 = x => x.toFixed(1);

function calc(){
  const fwd = S.dUser - S.dCam;
  const Lh = Math.hypot(fwd, S.w);
  const drop = S.h - S.aim;
  const pitch = Math.atan2(drop, Lh);
  const yaw = Math.atan2(S.w, Math.max(fwd, 1e-3));
  const dist3d = Math.hypot(Lh, drop);
  const Rfloor = drop > 0 ? S.h/Math.sin(pitch) : Infinity;
  const Dfloor = drop > 0 ? S.h/Math.tan(pitch) : Infinity;
  return { fwd, Lh, drop, pitch, yaw, dist3d, Rfloor, Dfloor, half: S.ang/2 };
}

// ---------- reusable diagrams ----------
function topDown(opts){
  const {showSpot=true, showCams=false, emph=""} = opts||{};
  const c = calc(), W=520, H=340, half = c.half*Math.PI/180;
  const wl = Math.max(S.dUser,3);
  const A=[-Math.sin(half)*wl, Math.cos(half)*wl], B=[Math.sin(half)*wl, Math.cos(half)*wl];
  const P=[0,S.dUser], C0=[-S.w,S.dCam], C1=[S.w,S.dCam];
  const pts=[[0,0],A,B,P,C0,C1];
  const xs=pts.map(p=>p[0]),ys=pts.map(p=>p[1]);
  const xmin=Math.min(...xs)-.4,xmax=Math.max(...xs)+.4,ymin=-.3,ymax=Math.max(...ys)+.4;
  const m=30,s=Math.min((W-2*m)/(xmax-xmin),(H-2*m)/(ymax-ymin)),ox=m-xmin*s,oy=H-m+ymin*s;
  const X=x=>(ox+x*s).toFixed(1), Y=y=>(oy-y*s).toFixed(1);
  const L=(a,b,col,wid,dash="")=>`<line x1="${X(a[0])}" y1="${Y(a[1])}" x2="${X(b[0])}" y2="${Y(b[1])}" stroke="${col}" stroke-width="${wid}" ${dash?`stroke-dasharray="${dash}"`:''}/>`;
  let g="";
  for(let gx=Math.ceil(xmin);gx<=Math.floor(xmax);gx++) g+=L([gx,ymin],[gx,ymax],"#26262e",1);
  for(let gy=Math.ceil(ymin);gy<=Math.floor(ymax);gy++) g+=L([xmin,gy],[xmax,gy],"#26262e",1);
  g+=L([0,0],A,"#3cc8dc",6)+L([0,0],B,"#3cc8dc",6);
  g+=`<text x="${X(A[0])}" y="${Y(A[1])-6}" fill="#3cc8dc" font-size="11" text-anchor="middle">Wall A</text>`;
  g+=`<text x="${X(B[0])}" y="${Y(B[1])-6}" fill="#3cc8dc" font-size="11" text-anchor="middle">Wall B</text>`;
  const clBright = emph==="centerline";
  g+=L([0,0],[0,ymax],clBright?"#46c66e":"#55556a",clBright?3:1.6,"6 5");
  if(clBright) g+=`<text x="${X(0)+6}" y="${Y(ymax)+14}" fill="#7fd69b" font-size="11">centerline (${f1(c.half)}° to each wall)</text>`;
  g+=`<circle cx="${X(0)}" cy="${Y(0)}" r="4" fill="#e7b24c"/><text x="${X(0)+7}" y="${Y(0)+14}" fill="#e7b24c" font-size="11">corner</text>`;
  if(showSpot){
    const br = emph==="spot";
    g+=`<circle cx="${X(P[0])}" cy="${Y(P[1])}" r="${br?8:6}" fill="${br?'#46c66e':'#e8e8ee'}"/>`;
    g+=`<text x="${X(P[0])+10}" y="${Y(P[1])+4}" fill="#cdd" font-size="11">stand here (${f1(S.dUser)} m)</text>`;
  }
  if(showCams){
    g+=L(C0,P,"rgba(200,120,220,.7)",2,"5 4")+L(C1,P,"rgba(231,178,76,.7)",2,"5 4");
    g+=`<circle cx="${X(C0[0])}" cy="${Y(C0[1])}" r="8" fill="#c878dc"/><text x="${X(C0[0])-11}" y="${Y(C0[1])+4}" fill="#dca9ec" font-size="11" text-anchor="end">cam0</text>`;
    g+=`<circle cx="${X(C1[0])}" cy="${Y(C1[1])}" r="8" fill="#e7b24c"/><text x="${X(C1[0])+11}" y="${Y(C1[1])+4}" fill="#f0c66a" font-size="11">cam1</text>`;
  }
  g+=`<line x1="${W-m-s}" y1="${H-10}" x2="${W-m}" y2="${H-10}" stroke="#cfd6dc" stroke-width="3"/><text x="${W-m-s/2}" y="${H-15}" fill="#cfd6dc" font-size="10" text-anchor="middle">1 m</text>`;
  return `<svg viewBox="0 0 ${W} ${H}">${g}</svg>`;
}

function sideView(opts){
  const {showLaser=false} = opts||{};
  const c = calc(), W=520, H=300;
  const farX=Math.max(c.Lh, showLaser&&isFinite(c.Dfloor)?c.Dfloor:c.Lh)+.6, topY=Math.max(S.h,2.3)+.4;
  const m=38,s=Math.min((W-2*m)/farX,(H-2*m)/topY),ox=m,oy=H-m;
  const X=x=>(ox+x*s).toFixed(1),Y=y=>(oy-y*s).toFixed(1);
  const L=(x1,y1,x2,y2,col,wid,dash="")=>`<line x1="${X(x1)}" y1="${Y(y1)}" x2="${X(x2)}" y2="${Y(y2)}" stroke="${col}" stroke-width="${wid}" ${dash?`stroke-dasharray="${dash}"`:''}/>`;
  let g="";
  for(let gy=0;gy<=Math.floor(topY);gy++) g+=L(0,gy,farX,gy,"#26262e",1);
  g+=L(0,0,farX,0,"#55556a",2);                                  // floor
  g+=L(0,0,0,S.h,"#777",4);                                      // stand
  g+=`<circle cx="${X(0)}" cy="${Y(S.h)}" r="7" fill="#c878dc"/><text x="${X(0)+10}" y="${Y(S.h)-6}" fill="#dca9ec" font-size="11">camera ${f2(S.h)} m</text>`;
  // person silhouette at Lh
  const headY=S.aim+0.35;
  g+=L(c.Lh,0,c.Lh,S.aim+0.18,"#5a5a66",4);
  g+=`<circle cx="${X(c.Lh)}" cy="${Y(headY)}" r="6" fill="#5a5a66"/>`;
  g+=`<circle cx="${X(c.Lh)}" cy="${Y(S.aim)}" r="5" fill="#e8e8ee"/><text x="${X(c.Lh)}" y="${Y(0)+15}" fill="#9aa" font-size="10" text-anchor="middle">person @ ${f1(c.Lh)} m</text>`;
  g+=`<line x1="${X(0)}" y1="${Y(S.aim)}" x2="${X(c.Lh)}" y2="${Y(S.aim)}" stroke="#33333f" stroke-width="1" stroke-dasharray="3 4"/><text x="${X(0)+4}" y="${Y(S.aim)-4}" fill="#7fd69b" font-size="10">chest/aim ${f2(S.aim)} m</text>`;
  // sightline camera -> chest
  g+=L(0,S.h,c.Lh,S.aim,"#46c66e",2.5);
  if(showLaser && isFinite(c.Dfloor)){
    g+=L(c.Lh,S.aim,c.Dfloor,0,"#46c66e",1.5,"4 4");
    g+=`<circle cx="${X(c.Dfloor)}" cy="${Y(0)}" r="4" fill="#46c66e"/><text x="${X(c.Dfloor)}" y="${Y(0)+15}" fill="#7fd69b" font-size="10" text-anchor="middle">floor dot</text>`;
  }
  g+=`<text x="${X(0)+14}" y="${Y(S.h/2)}" fill="#7fd69b" font-size="11">tilt ${f1(D(c.pitch))}°</text>`;
  return `<svg viewBox="0 0 ${W} ${H}">${g}</svg>`;
}

// slider helper: builds a labeled range bound to S[key], re-renders current step on input
function slider(key,label,min,max,step,unit,hint){
  return `<label class="ctl"><div class="row"><b>${label}</b><span class="v"><span data-v="${key}">${S[key]}</span> ${unit}</span></div>
    <input type="range" data-k="${key}" min="${min}" max="${max}" step="${step}" value="${S[key]}">
    ${hint?`<div class="hint">${hint}</div>`:''}</label>`;
}

// ---------- the steps ----------
const steps = [
{ title:"Mark the centerline", kicker:"Step 1 · Floor layout",
  render(){ return `
   <div class="grid">
     <div>
       <p>Find the <b>corner</b> where the two walls meet. Run a tape on the floor that <b>bisects</b> the corner —
          the same angle to each wall. This <b>centerline</b> is the spine of the whole setup.</p>
       ${slider("ang","Corner angle (you measured ~89°)","70","120","1","°","Angle between the walls.")}
       <div class="out">Run the tape at <span class="num" data-o="half"></span>° to <b>each</b> wall.</div>
       <div class="tip"><span class="callhead">Tip:</span> a quick bisector — measure 1 m along each wall from the corner, mark both points, and aim the tape at the midpoint between them.</div>
     </div>
     <figure><div data-svg></div><figcaption>Top-down: the centerline bisects the corner.</figcaption></figure>
   </div>`; },
  draw(){ return topDown({emph:"centerline"}); },
  outs(c){ return {half:f1(c.half)}; } },

{ title:"Mark the standing spot", kicker:"Step 2 · Floor layout",
  render(){ return `
   <div class="grid">
     <div>
       <p>Decide where people will <b>stand and point</b> — a spot on the centerline. Mark it with tape. This is what the
          cameras will aim at, and where pointing will be most accurate.</p>
       ${slider("dUser","People stand … from the corner","1.0","4.0","0.1","m","Along the centerline.")}
       <div class="out">Mark the standing spot <span class="num" data-o="du"></span> m out along the centerline.</div>
       <div class="note"><span class="callhead">Keep it comfy:</span> ~2–3 m gives the Kinect a clean view of the whole body.</div>
     </div>
     <figure><div data-svg></div><figcaption>The standing spot, on the centerline.</figcaption></figure>
   </div>`; },
  draw(){ return topDown({emph:"spot"}); },
  outs(){ return {du:f1(S.dUser)}; } },

{ title:"Set the stand height", kicker:"Step 3 · The stands",
  render(){ return `
   <div class="grid">
     <div>
       <p>Mount each Kinect <b>above head height</b>, looking <b>down</b> at people. Because they face the walls to point,
          a high camera sees their <b>faces and arms</b> — exactly what the eye→hand pointing needs (a low/behind camera
          only sees backs).</p>
       ${slider("h","Stand / camera height","1.2","2.8","0.05","m","Set this exactly on your adjustable stand.")}
       ${slider("aim","Aim height (chest/face)","1.0","1.8","0.05","m","Point the camera at the middle of the upper body.")}
       <div class="out">Camera sits <span class="num" data-o="drop"></span> m above the chest line, tilting down <span class="num" data-o="pitch"></span>°.</div>
     </div>
     <figure><div data-svg></div><figcaption>Side view: camera high, tilted down onto the chest.</figcaption></figure>
   </div>`; },
  draw(){ return sideView({}); },
  outs(c){ return {drop:f2(c.drop), pitch:f1(D(c.pitch))}; } },

{ title:"Place the two stands", kicker:"Step 4 · The stands",
  render(){ return `
   <div class="grid">
     <div>
       <p>Put one stand on each side of the centerline, a little out from the corner. The <b>side-spread</b> gives the two
          cameras different angles, so someone blocked from one is seen by the other.</p>
       ${slider("dCam","Stands … out from the corner","0.0","2.0","0.1","m","Along the centerline.")}
       ${slider("w","Side-spread (each side ±)","0.3","2.0","0.1","m","How far each camera sits to its side.")}
       <div class="cams">
         <div class="camcard c0"><h3>cam0 (left)</h3><div class="kv"><span class="k">out</span><span class="val" data-o="dc"></span></div><div class="kv"><span class="k">to the left</span><span class="val" data-o="wv"></span></div></div>
         <div class="camcard c1"><h3>cam1 (right)</h3><div class="kv"><span class="k">out</span><span class="val" data-o="dc2"></span></div><div class="kv"><span class="k">to the right</span><span class="val" data-o="wv2"></span></div></div>
       </div>
     </div>
     <figure><div data-svg></div><figcaption>Top-down: both stands flanking the centerline, aimed at the standing spot.</figcaption></figure>
   </div>`; },
  draw(){ return topDown({showCams:true}); },
  outs(){ return {dc:f1(S.dCam)+" m", wv:f1(S.w)+" m", dc2:f1(S.dCam)+" m", wv2:f1(S.w)+" m"}; } },

{ title:"Aim with the laser", kicker:"Step 5 · Precise aim",
  render(){ return `
   <div class="grid">
     <div>
       <p>Your laser measurer reads <b>distance</b> — use that to aim exactly:</p>
       <ol>
         <li>Put a marker at <b>chest height</b> on the standing spot (a box, a tripod, or a person with tape on their chest).</li>
         <li>Aim the camera's <b>laser dot at that chest marker</b>, adjusting pan + tilt together.</li>
         <li>It's aimed right when the dot is on the marker <b>and the measurer reads the distance below</b>.</li>
       </ol>
       <div class="out">Aim the laser at the chest marker; the reading should be <span class="num" data-o="d3"></span> m.<br>
         <span style="color:var(--dim);font-size:13px">(tilt down <span data-o="pitch2"></span>°, pan in <span data-o="yaw"></span>° — the reading nails both.)</span></div>
       <div data-o="range"></div>
     </div>
     <figure><div data-svg></div><figcaption>Side view: the laser line runs from the camera through the chest marker.</figcaption></figure>
   </div>`; },
  draw(){ return sideView({showLaser:true}); },
  outs(c){
    let r;
    if(c.dist3d<1.2) r=`<div class="warn">Only <b>${f2(c.dist3d)} m</b> to people — a bit close for the Kinect. Move stands out or the spot back.</div>`;
    else if(c.dist3d>3.5) r=`<div class="warn"><b>${f2(c.dist3d)} m</b> to people — near the far limit; depth gets noisy past ~3.5 m.</div>`;
    else r=`<div class="ok"><b>${f2(c.dist3d)} m</b> to people — right in the Kinect's sweet spot. 👍</div>`;
    return {d3:f2(c.dist3d), pitch2:f1(D(c.pitch)), yaw:f1(D(c.yaw)), range:r};
  } },

{ title:"Repeat & calibrate", kicker:"Step 6 · Finish",
  render(){ return `
   <div class="grid">
     <div>
       <p>Do <b>both</b> cameras the same way (cam1 is the mirror of cam0). Then the software learns the exact geometry
          in the calibration step.</p>
       <div class="cams">
         <div class="camcard c0"><h3>cam0 (left)</h3>
           <div class="kv"><span class="k">height</span><span class="val" data-o="h0"></span></div>
           <div class="kv"><span class="k">out · left</span><span class="val" data-o="p0"></span></div>
           <div class="kv"><span class="k">laser reads</span><span class="val" data-o="r0"></span></div></div>
         <div class="camcard c1"><h3>cam1 (right)</h3>
           <div class="kv"><span class="k">height</span><span class="val" data-o="h1"></span></div>
           <div class="kv"><span class="k">out · right</span><span class="val" data-o="p1"></span></div>
           <div class="kv"><span class="k">laser reads</span><span class="val" data-o="r1"></span></div></div>
       </div>
       <div class="note"><span class="callhead">Next:</span> wire each Kinect (own USB-3 controller), then calibrate the walls, then register the 2nd camera:
         <br><code>.venv/bin/python -m gesturewall.calibrate --config room.json --register cam1</code></div>
       <div class="ok">Your aim is now repeatable &amp; measured — re-run this any time you move a stand.</div>
     </div>
     <figure><div data-svg></div><figcaption>Final top-down layout, to scale.</figcaption></figure>
   </div>`; },
  draw(){ return topDown({showCams:true}); },
  outs(c){ const p=f1(S.dCam)+" m · "+f1(S.w)+" m";
    return {h0:f2(S.h)+" m",h1:f2(S.h)+" m",p0:p,p1:p,r0:f2(c.dist3d)+" m",r1:f2(c.dist3d)+" m"}; } },
];

// ---------- engine ----------
let cur = 0;
const stage=document.getElementById("stage"), fill=document.getElementById("fill"),
      count=document.getElementById("count"), prevB=document.getElementById("prev"), nextB=document.getElementById("next");

function refresh(){
  const step=steps[cur], c=calc();
  // redraw svg
  const svgHost=stage.querySelector("[data-svg]"); if(svgHost) svgHost.innerHTML=step.draw();
  // value readouts on sliders
  stage.querySelectorAll("[data-v]").forEach(el=>{ const k=el.getAttribute("data-v");
    el.textContent = (k==="ang")?S[k]:(Number.isInteger(S[k])?S[k]:S[k].toFixed(2).replace(/0$/,'')); });
  // computed outputs
  const o=step.outs?step.outs(c):{};
  stage.querySelectorAll("[data-o]").forEach(el=>{ const k=el.getAttribute("data-o"); if(k in o) el.innerHTML=o[k]; });
}

function render(){
  const step=steps[cur];
  stage.innerHTML=`<p class="kicker">${step.kicker}</p><h2>${step.title}</h2>${step.render()}`;
  stage.querySelectorAll("input[type=range]").forEach(inp=>{
    inp.addEventListener("input",()=>{ const k=inp.getAttribute("data-k"); S[k]=parseFloat(inp.value); refresh(); });
  });
  fill.style.width=((cur+1)/steps.length*100)+"%";
  count.textContent=`Step ${cur+1} / ${steps.length}`;
  prevB.disabled=cur===0; nextB.textContent = cur===steps.length-1 ? "Done ✓" : "Next →";
  refresh();
}
function go(i){ cur=Math.max(0,Math.min(steps.length-1,i)); render(); window.scrollTo(0,0); }
prevB.onclick=()=>go(cur-1);
nextB.onclick=()=>{ if(cur<steps.length-1) go(cur+1); };
document.addEventListener("keydown",e=>{ if(e.target.tagName==="INPUT")return;
  if(e.key==="ArrowRight")go(cur+1); else if(e.key==="ArrowLeft")go(cur-1); });
go(0);
</script>
</body>
</html>
